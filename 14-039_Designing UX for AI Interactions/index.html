<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>AI Study Assistant</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">
    <h1>AI Study Assistant</h1>

    <p>
      Enter a topic below and generate a short study tip.
      This example demonstrates loading states, retry behavior,
      and user feedback for an AI-powered feature.
    </p>

    <label for="topic-input">
      Study topic
    </label>

    <textarea id="topic-input"
              placeholder="For example: JavaScript promises"></textarea>

    <div class="button-group">
      <button id="generate-btn">
        Generate Study Tip
      </button>

      <button id="retry-btn" hidden>
        Retry
      </button>
    </div>

    <p id="status-message"
       aria-live="polite"></p>

    <section id="response-container"
             aria-label="Generated study tip">
    </section>
  </main>

  <script src="script.js"></script>

</body>
</html>
